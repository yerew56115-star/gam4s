<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Stealth Arcade - High-performance unblocked games portal" />
    <link rel="icon" type="image/svg+xml" href="https://img.icons8.com/color/48/000000/controller.png" />
    <title>Stealth Arcade</title>
  </head>
  <body>
    <script>
      // Global error handler for debugging production white screens
      window.onerror = function(message, source, lineno, colno, error) {
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `<div style="background:#0c0c0e;color:#f87171;padding:2rem;font-family:monospace;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
            <h1 style="font-size:1.5rem;margin-bottom:1rem;letter-spacing:0.1em;">CRITICAL_SYSTEM_ERROR</h1>
            <div style="background:#18181b;padding:1.5rem;border-radius:8px;max-width:600px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.5);border:1px solid #27272a;">
              <p style="font-size:0.9rem;color:#a1a1aa;margin-bottom:1rem;">The system failed to initialize its logic core.</p>
              <pre style="background:#09090b;padding:1rem;border-radius:4px;overflow:auto;font-size:0.75rem;color:#f87171;text-align:left;border:1px solid #3f3f46;">${message}</pre>
              <div style="margin-top:1.5rem;text-align:left;font-size:0.8rem;color:#71717a;">
                <p>Possible causes:</p>
                <ul style="margin-top:0.5rem;list-style:disc;padding-left:1.5rem;">
                  <li>You uploaded source files instead of the <b>dist</b> folder.</li>
                  <li>Firebase Authorized Domains are not configured correctly.</li>
                  <li>The browser failed to load the JavaScript bundle (CORS/404).</li>
                </ul>
              </div>
            </div>
            <button onclick="location.reload()" style="margin-top:2rem;background:#4f46e5;color:white;border:none;padding:0.75rem 1.5rem;border-radius:4px;cursor:pointer;font-weight:bold;text-transform:uppercase;font-size:10px;tracking:0.2em;">Retry Connection</button>
          </div>`;
        }
        return false;
      };
    </script>
    <div id="root">
      <div style="background:#0c0c0e;color:#4f46e5;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:ui-monospace,monospace;">
        <div style="width:40px;height:40px;border:3px solid #18181b;border-top-color:#4f46e5;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <p style="margin-top:20px;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;">Initializing Stealth Node...</p>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
